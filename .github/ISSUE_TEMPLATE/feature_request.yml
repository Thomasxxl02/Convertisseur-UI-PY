name: "Feature request"
description: "Proposer une amelioration"
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Probleme a resoudre
      description: Quel besoin ou douleur cette fonctionnalite couvre ?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposition
      description: Decris la solution souhaitee.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considerees
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Contexte supplementaire
    validations:
      required: false
